<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .play-btn {
      margin: 10px; padding: 12px 30px; background: #ff4d6d; color: white;
      border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1500; }
    .cute-panel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; background: #fff; color: #333; padding: 30px 20px; border-radius: 25px;
      z-index: 2000; text-align: center; box-shadow: 0 0 20px #ff4d6d;
    }

    .game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; }
    #snake-canvas { background: #000; border: 2px solid #ffb703; display: block; margin: 60px auto 10px; box-shadow: 0 0 15px #ffb703; border-radius: 10px; }
    .stats { position: absolute; top: 20px; left: 20px; text-align: left; font-weight: bold; color: #ffb703; }

    .controls { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr); width: 180px; margin: 20px auto; gap: 5px; }
    .ctrl-btn { padding: 15px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <div class="dev-name" style="position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: bold;">Dev by Faisal</div>

  <div class="container">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" style="width:100%; max-width:400px; display:block; margin:auto; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>hum humesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="startSnakeGame()" style="background:#ffb703;">Chick Game 🐤</button>
  </div>

  <div id="end-panel" class="cute-panel">
    <h2 id="end-msg" style="color:#ff4d6d"></h2>
    <p>aur kissyan lenge kiaa 🤭</p>
    <button class="play-btn" onclick="location.reload()" style="animation:none">Yesii! ❤️</button>
  </div>

  <div id="snake-screen" class="game-screen">
    <div class="stats">💋 Score: <span id="snake-score">0</span></div>
    <canvas id="snake-canvas"></canvas>
    <div class="controls">
        <div></div><button class="ctrl-btn" onclick="changeDir('UP')">▲</button><div></div>
        <button class="ctrl-btn" onclick="changeDir('LEFT')">◀</button><button class="ctrl-btn" onclick="changeDir('DOWN')">▼</button><button class="ctrl-btn" onclick="changeDir('RIGHT')">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("snake-canvas");
    const ctx = canvas.getContext("2d");
    const box = 20;
    let score, chickBody, food, direction, nextDir, gameSpeed, lastTime;

    function startSnakeGame() {
        document.getElementById('snake-screen').style.display = 'block';
        canvas.width = 300; canvas.height = 300;
        chickBody = [{x: 6 * box, y: 7 * box}];
        food = getRandomFood();
        direction = "RIGHT";
        nextDir = "RIGHT";
        score = 0;
        gameSpeed = 200; // Shuru mein slow speed
        lastTime = 0;
        requestAnimationFrame(gameLoop);
    }

    function changeDir(dir) {
        if (dir === 'UP' && direction !== 'DOWN') nextDir = 'UP';
        if (dir === 'DOWN' && direction !== 'UP') nextDir = 'DOWN';
        if (dir === 'LEFT' && direction !== 'RIGHT') nextDir = 'LEFT';
        if (dir === 'RIGHT' && direction !== 'LEFT') nextDir = 'RIGHT';
    }

    function getRandomFood() {
        return { x: Math.floor(Math.random() * 14) * box, y: Math.floor(Math.random() * 14) * box };
    }

    function gameLoop(currentTime) {
        if (!document.getElementById('snake-screen').style.display || document.getElementById('snake-screen').style.display === 'none') return;
        
        requestAnimationFrame(gameLoop);
        const deltaTime = currentTime - lastTime;
        if (deltaTime < gameSpeed) return;
        lastTime = currentTime;

        update();
        draw();
    }

    function update() {
        direction = nextDir;
        let headX = chickBody[0].x;
        let headY = chickBody[0].y;

        if (direction === "LEFT") headX -= box;
        if (direction === "UP") headY -= box;
        if (direction === "RIGHT") headX += box;
        if (direction === "DOWN") headY += box;

        if (headX === food.x && headY === food.y) {
            score++;
            document.getElementById('snake-score').innerText = score;
            food = getRandomFood();
            // Speed increase logic: Har kissy par speed 5ms fast hogi (minimum 80ms tak)
            if (gameSpeed > 80) gameSpeed -= 5;
        } else {
            chickBody.pop();
        }

        let newHead = { x: headX, y: headY };
        if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || collision(newHead, chickBody)) {
            gameOver();
        }
        chickBody.unshift(newHead);
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < chickBody.length; i++) {
            ctx.font = "18px Arial";
            ctx.fillText(i === 0 ? "🐤" : "🐥", chickBody[i].x, chickBody[i].y + 15);
        }

        ctx.font = "20px Arial";
        ctx.fillText("💋", food.x, food.y + 15);
    }

    function collision(head, array) {
        for (let i = 0; i < array.length; i++) {
            if (head.x === array[i].x && head.y === array[i].y) return true;
        }
        return false;
    }

    function gameOver() {
        document.getElementById('snake-screen').style.display = 'none';
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('end-msg').innerText = `wow januuaaa ${score} kissyan li hain`;
        document.getElementById('end-panel').style.display = 'block';
    }
  </script>
</body>
</html>
