<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <style>
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; }
    
    /* Game Overlay */
    #game-container {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, #1a1a1a, #4a0e1c);
      z-index: 100;
    }

    #basket {
      position: absolute;
      bottom: 30px;
      left: 50%;
      width: 90px; height: 60px;
      background: #ff4d6d;
      border-radius: 10px 10px 50px 50px;
      transform: translateX(-50%);
      box-shadow: 0 5px 15px rgba(255, 77, 109, 0.5);
      font-size: 2rem;
      line-height: 60px;
    }

    .kiss { position: absolute; font-size: 2.5rem; user-select: none; transition: transform 0.1s; cursor: pointer; }

    .score { position: absolute; top: 20px; left: 20px; font-size: 1.8rem; color: #ff4d6d; font-weight: bold; }
    .play-btn {
      margin-top: 25px;
      padding: 15px 40px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" alt="Cute GIF" style="width:90%; max-width:400px; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>Hum hamesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="openGame()">🎮 Play Our Game 💋</button>
  </div>

  <div id="game-container">
    <div class="score">Kisses Catch: <span id="score-val">0</span></div>
    <div style="position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.2rem;" onclick="closeGame()">✖ Exit</div>
    <div id="basket">🧺</div>
  </div>

  <script>
    let score = 0;
    let gameActive = false;
    const basket = document.getElementById('basket');
    const container = document.getElementById('game-container');

    function openGame() {
        gameActive = true;
        score = 0;
        document.getElementById('score-val').innerText = score;
        container.style.display = 'block';
        spawnKiss();
    }

    function closeGame() {
        gameActive = false;
        container.style.display = 'none';
    }

    // Move Basket
    const moveBasket = (e) => {
        if(!gameActive) return;
        let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        basket.style.left = Math.max(45, Math.min(window.innerWidth - 45, x)) + 'px';
    };

    window.addEventListener('mousemove', moveBasket);
    window.addEventListener('touchmove', moveBasket);

    function spawnKiss() {
        if(!gameActive) return;

        const kiss = document.createElement('div');
        kiss.innerText = '💋';
        kiss.className = 'kiss';
        kiss.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        kiss.style.top = '-50px';
        container.appendChild(kiss);

        let fall = setInterval(() => {
            let top = parseInt(kiss.style.top);
            kiss.style.top = (top + 6) + 'px';

            let kRect = kiss.getBoundingClientRect();
            let bRect = basket.getBoundingClientRect();

            if (kRect.bottom >= bRect.top && kRect.right >= bRect.left && kRect.left <= bRect.right) {
                // Kiss Caught!
                score++;
                document.getElementById('score-val').innerText = score;
                kiss.remove();
                clearInterval(fall);
            }

            if (top > window.innerHeight) {
                kiss.remove();
                clearInterval(fall);
            }
        }, 20);

        setTimeout(spawnKiss, 900);
    }
  </script>
</body>
</html>
