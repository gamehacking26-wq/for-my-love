<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* Aapka Original Style */
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Game Buttons & Panels */
    .play-btn {
      margin-top: 20px; padding: 12px 30px; background: #ff4d6d; color: white;
      border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    #overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); z-index: 1500;
    }

    .cute-panel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; background: #fff; color: #333; padding: 30px 20px; border-radius: 25px;
      z-index: 2000; text-align: center; box-shadow: 0 0 20px #ff4d6d;
    }

    /* Game Elements */
    #game-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; }
    #basket { position: absolute; bottom: 30px; left: 50%; width: 80px; height: 50px; background: #ff4d6d; border-radius: 0 0 40px 40px; transform: translateX(-50%); font-size: 2rem; line-height: 50px; }
    .kiss-obj { position: absolute; font-size: 2.5rem; }
    .effect-emoji { position: absolute; font-size: 2.5rem; animation: fadeUp 0.8s forwards; }
    @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    .stats { position: absolute; top: 20px; left: 20px; text-align: left; font-weight: bold; color: #ff4d6d; }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <div class="dev-name" style="position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: bold;">
    Dev by Faisal
  </div>

  <div class="container" id="main-ui">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" alt="Cute GIF" style="width:100%; max-width:400px; display:block; margin:auto; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>hum humesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="showStartPanel()">Play Game 💋</button>
  </div>

  <div id="start-panel" class="cute-panel">
    <h2 style="color:#ff4d6d">Babu kissyan 😘</h2>
    <button class="play-btn" onclick="startGame()" style="animation:none">Babu kissyan den 👉🏻👈🏻</button>
  </div>

  <div id="end-panel" class="cute-panel">
    <h2 id="end-msg"></h2>
    <p>aur kissyan lenge kiaa 🤭</p>
    <button class="play-btn" onclick="location.reload()" style="animation:none">Yesii! ❤️</button>
  </div>

  <div id="game-container">
    <div class="stats">
        💋 Score: <span id="s-val">0</span><br>
        ❌ Miss: <span id="m-val">0</span>/3
    </div>
    <div id="basket">🧺</div>
  </div>

  <script>
    let score = 0, misses = 0, gameActive = false;

    function showStartPanel() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('start-panel').style.display = 'block';
    }

    function startGame() {
        document.getElementById('start-panel').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        gameActive = true;
        document.getElementById('game-container').style.display = 'block';
        spawn();
    }

    const basket = document.getElementById('basket');
    const handleMove = (e) => {
        if(!gameActive) return;
        let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        basket.style.left = Math.max(40, Math.min(window.innerWidth - 40, x)) + 'px';
    };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);

    function spawn() {
        if(!gameActive) return;
        const k = document.createElement('div');
        k.innerText = '💋'; k.className = 'kiss-obj';
        k.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        k.style.top = '-50px';
        document.getElementById('game-container').appendChild(k);

        let fall = setInterval(() => {
            let top = parseInt(k.style.top);
            k.style.top = (top + 6) + 'px';
            let kr = k.getBoundingClientRect(), br = basket.getBoundingClientRect();

            if (kr.bottom >= br.top && kr.right >= br.left && kr.left <= br.right) {
                score++; document.getElementById('s-val').innerText = score;
                pop('😘', kr.left, kr.top);
                k.remove(); clearInterval(fall);
            } else if (top > window.innerHeight) {
                misses++; document.getElementById('m-val').innerText = misses;
                pop('🥺', kr.left, window.innerHeight - 60);
                k.remove(); clearInterval(fall);
                if(misses >= 3) gameOver();
            }
        }, 20);
        if(gameActive) setTimeout(spawn, 1000);
    }

    function pop(emoji, x, y) {
        const d = document.createElement('div');
        d.innerText = emoji; d.className = 'effect-emoji';
        d.style.left = x + 'px'; d.style.top = y + 'px';
        document.getElementById('game-container').appendChild(d);
        setTimeout(() => d.remove(), 800);
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('end-msg').innerText = `wow januuaaa ${score} kissyan li hain`;
        document.getElementById('end-panel').style.display = 'block';
    }
  </script>
</body>
</html>
