<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .play-btn {
      margin: 10px; padding: 12px 30px; background: #ff4d6d; color: white;
      border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1500; }
    .cute-panel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; background: #fff; color: #333; padding: 30px 20px; border-radius: 25px;
      z-index: 2000; text-align: center; box-shadow: 0 0 20px #ff4d6d;
    }

    .game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; }
    #snake-canvas { background: #000; border: 2px solid #ffb703; display: block; margin: 60px auto 10px; box-shadow: 0 0 15px #ffb703; border-radius: 10px; }
    .stats { position: absolute; top: 20px; left: 20px; text-align: left; font-weight: bold; color: #ffb703; }
    
    .controls { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr); width: 180px; margin-left: auto; margin-right: auto; gap: 5px; }
    .ctrl-btn { padding: 15px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
    
    #basket { position: absolute; bottom: 30px; left: 50%; width: 80px; height: 50px; background: #ff4d6d; border-radius: 0 0 40px 40px; transform: translateX(-50%); font-size: 2rem; line-height: 50px; }
    .kiss-obj { position: absolute; font-size: 2.5rem; }
    .effect-emoji { position: absolute; font-size: 2.5rem; animation: fadeUp 0.8s forwards; }
    @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <div class="container" id="main-ui">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" alt="Cute GIF" style="width:100%; max-width:400px; display:block; margin:auto; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>hum humesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="showStartPanel()">Play Catch Game 💋</button>
    <button class="play-btn" onclick="startChickGame()" style="background:#ffb703;">Chick Game 🐤</button>
  </div>

  <div id="start-panel" class="cute-panel">
    <h2 style="color:#ff4d6d">Babu kissyan 😘</h2>
    <button class="play-btn" onclick="startCatchGame()" style="animation:none">Babu kissyan den 👉🏻👈🏻</button>
  </div>

  <div id="end-panel" class="cute-panel">
    <h2 id="end-msg"></h2>
    <p>aur kissyan lenge kiaa 🤭</p>
    <button class="play-btn" onclick="location.reload()" style="animation:none">Yesii! ❤️</button>
  </div>

  <div id="game-container" class="game-screen">
    <div class="stats" style="color:#ff4d6d;">💋 Score: <span id="s-val">0</span><br>❌ Miss: <span id="m-val">0</span>/3</div>
    <div id="basket">🧺</div>
  </div>

  <div id="snake-screen" class="game-screen">
    <div class="stats">💋 Kisses: <span id="snake-score">0</span></div>
    <canvas id="snake-canvas"></canvas>
    <div class="controls">
        <div></div><button class="ctrl-btn" onclick="changeDir('UP')">▲</button><div></div>
        <button class="ctrl-btn" onclick="changeDir('LEFT')">◀</button><button class="ctrl-btn" onclick="changeDir('DOWN')">▼</button><button class="ctrl-btn" onclick="changeDir('RIGHT')">▶</button>
    </div>
  </div>

  <script>
    let score = 0, misses = 0, gameActive = false, currentGame = "";
    let chickBody, food, direction, lastTime = 0, baseSpeed = 160;
    const box = 20;
    const canvas = document.getElementById("snake-canvas");
    const ctx = canvas.getContext("2d");

    function showStartPanel() { document.getElementById('overlay').style.display = 'block'; document.getElementById('start-panel').style.display = 'block'; }

    // --- CATCH GAME ---
    function startCatchGame() {
        document.getElementById('start-panel').style.display = 'none'; document.getElementById('overlay').style.display = 'none';
        gameActive = true; currentGame = "catch"; document.getElementById('game-container').style.display = 'block'; spawnCatch();
    }

    // --- CHICK GAME ---
    function startChickGame() {
        document.getElementById('snake-screen').style.display = 'block';
        canvas.width = 300; canvas.height = 300;
        chickBody = [{x: 8 * box, y: 10 * box}];
        food = { x: Math.floor(Math.random() * 14) * box, y: Math.floor(Math.random() * 14) * box };
        direction = "RIGHT"; score = 0; lastTime = 0; gameActive = true; currentGame = "chick";
        requestAnimationFrame(chickLoop);
    }

    function changeDir(dir) {
        if(dir=="UP" && direction!="DOWN") direction="UP";
        if(dir=="DOWN" && direction!="UP") direction="DOWN";
        if(dir=="LEFT" && direction!="RIGHT") direction="LEFT";
        if(dir=="RIGHT" && direction!="LEFT") direction="RIGHT";
    }

    function chickLoop(t) {
        if (!gameActive || currentGame !== "chick") return;
        let speed = Math.max(70, baseSpeed - (score * 8));
        if (!lastTime) lastTime = t;
        if (t - lastTime > speed) {
            updateChick(); drawChick(); lastTime = t;
        }
        requestAnimationFrame(chickLoop);
    }

    function drawChick() {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        chickBody.forEach((part, i) => {
            ctx.font = "18px Arial"; ctx.fillText(i === 0 ? "🐤" : "🐥", part.x, part.y + 15);
        });
        ctx.font = "20px Arial"; ctx.fillText("💋", food.x, food.y + 15);
    }

    function updateChick() {
        let head = { ...chickBody[0] };
        if(direction === "UP") head.y -= box; if(direction === "DOWN") head.y += box;
        if(direction === "LEFT") head.x -= box; if(direction === "RIGHT") head.x += box;

        if(head.x === food.x && head.y === food.y) {
            score++; document.getElementById('snake-score').innerText = score;
            food = { x: Math.floor(Math.random() * 14) * box, y: Math.floor(Math.random() * 14) * box };
        } else { chickBody.pop(); }

        if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || chickBody.some(p => p.x === head.x && p.y === head.y)) {
            gameActive = false; gameOver(); return;
        }
        chickBody.unshift(head);
    }

    // --- SHARED LOGIC ---
    function spawnCatch() {
        if(!gameActive || currentGame !== "catch") return;
        const k = document.createElement('div');
        k.innerText = '💋'; k.className = 'kiss-obj';
        k.style.left = Math.random() * (window.innerWidth - 40) + 'px'; k.style.top = '-50px';
        document.getElementById('game-container').appendChild(k);
        let f = setInterval(() => {
            let t = parseInt(k.style.top); k.style.top = (t + 6) + 'px';
            let kr = k.getBoundingClientRect(), br = document.getElementById('basket').getBoundingClientRect();
            if(kr.bottom >= br.top && kr.right >= br.left && kr.left <= br.right) {
                score++; document.getElementById('s-val').innerText = score; pop('😘', kr.left, kr.top); k.remove(); clearInterval(f);
            } else if(t > window.innerHeight) {
                misses++; document.getElementById('m-val').innerText = misses; pop('🥺', kr.left, window.innerHeight - 60); k.remove(); clearInterval(f);
                if(misses >= 3) { gameActive = false; gameOver(); }
            }
        }, 20);
        setTimeout(spawnCatch, 1000);
    }

    function pop(e, x, y) {
        const d = document.createElement('div'); d.innerText = e; d.className = 'effect-emoji';
        d.style.left = x + 'px'; d.style.top = y + 'px';
        document.getElementById('game-container').appendChild(d);
        setTimeout(() => d.remove(), 800);
    }

    function gameOver() {
        document.querySelectorAll('.game-screen').forEach(s => s.style.display = 'none');
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('end-msg').innerText = `wow januuaaa ${score} kissyan li hain`;
        document.getElementById('end-panel').style.display = 'block';
    }

    window.addEventListener('mousemove', (e) => { if(gameActive && currentGame === "catch") document.getElementById('basket').style.left = e.clientX + 'px'; });
    window.addEventListener('touchmove', (e) => { if(gameActive && currentGame === "catch") document.getElementById('basket').style.left = e.touches[0].clientX + 'px'; });
  </script>
</body>
</html>
