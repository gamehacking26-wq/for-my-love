<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <style>
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; transition: 0.5s; }
    
    /* Background Dark Overlay */
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); /* Blackish background */
      backdrop-filter: blur(5px); /* Background blur effect */
      z-index: 1500;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .play-btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    /* --- Cute Babu Panel --- */
    #kissy-panel {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      background: #fff;
      color: #333;
      padding: 30px 20px;
      border-radius: 25px;
      box-shadow: 0 0 30px rgba(255, 77, 109, 0.8);
      z-index: 2000;
      text-align: center;
    }

    #kissy-panel h2 { font-size: 1.5rem; margin-bottom: 20px; color: #ff4d6d; font-weight: bold; }

    .kissy-btn {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
    }

    /* Game Screen */
    #game-container {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a1a;
      z-index: 2500;
    }

    #basket { position: absolute; bottom: 30px; left: 50%; width: 80px; height: 50px; background: #ff4d6d; border-radius: 0 0 40px 40px; transform: translateX(-50%); font-size: 2rem; line-height: 50px; }
    .kiss-obj { position: absolute; font-size: 2.5rem; }
    .score-text { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #ff4d6d; font-weight: bold; }
    .exit-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; color: white; background: #333; padding: 5px 15px; border-radius: 20px; }
  </style>
</head>
<body>

  <div id="overlay"></div> <div class="container" id="main-content">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" alt="Cute GIF" style="width:100%; max-width:400px; display:block; margin:auto; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>hum humesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="showPanel()">Play Cute Game 💋</button>
  </div>

  <div id="kissy-panel">
    <h2>Babu kissyan 😘</h2>
    <button class="kissy-btn" onclick="startGame()">Babu kissyan den 👉🏻👈🏻</button>
  </div>

  <div id="game-container">
    <div class="score-text">Score: <span id="score-val">0</span></div>
    <div class="exit-btn" onclick="location.reload()">Exit</div>
    <div id="basket">🧺</div>
  </div>

  <script>
    let score = 0;
    let gameActive = false;

    function showPanel() {
        document.getElementById('overlay').style.display = 'block'; // Background dark ho jayega
        document.getElementById('kissy-panel').style.display = 'block';
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('kissy-panel').style.display = 'none';
        gameActive = true;
        document.getElementById('game-container').style.display = 'block';
        spawnKiss();
    }

    // Basket Movement
    const basket = document.getElementById('basket');
    const move = (e) => {
        if(!gameActive) return;
        let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        basket.style.left = Math.max(40, Math.min(window.innerWidth - 40, x)) + 'px';
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move);

    function spawnKiss() {
        if(!gameActive) return;
        const kiss = document.createElement('div');
        kiss.innerText = '💋';
        kiss.style.position = 'absolute';
        kiss.style.fontSize = '2.5rem';
        kiss.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        kiss.style.top = '-50px';
        document.getElementById('game-container').appendChild(kiss);

        let fall = setInterval(() => {
            let top = parseInt(kiss.style.top);
            kiss.style.top = (top + 6) + 'px';
            let kr = kiss.getBoundingClientRect();
            let br = basket.getBoundingClientRect();

            if (kr.bottom >= br.top && kr.right >= br.left && kr.left <= br.right) {
                score++;
                document.getElementById('score-val').innerText = score;
                kiss.remove(); clearInterval(fall);
            }
            if (top > window.innerHeight) {
                kiss.remove(); clearInterval(fall);
            }
        }, 20);
        setTimeout(spawnKiss, 1000);
    }
  </script>
</body>
</html>
