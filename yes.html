<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Forever ❤️</title>
  <style>
    body { background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; overflow: hidden; margin: 0; }
    .container { padding-top: 50px; }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .play-btn {
      margin-top: 25px;
      padding: 15px 40px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      animation: pulse 1.5s infinite;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
    }

    /* Game Overlay */
    #game-container {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, #1a1a1a, #4a0e1c);
      z-index: 1000;
    }

    #basket {
      position: absolute;
      bottom: 30px;
      left: 50%;
      width: 90px; height: 60px;
      background: #ff4d6d;
      border-radius: 10px 10px 50px 50px;
      transform: translateX(-50%);
      font-size: 2rem;
      line-height: 60px;
      box-shadow: 0 5px 15px rgba(255, 77, 109, 0.5);
    }

    .kiss-obj { position: absolute; font-size: 2.5rem; user-select: none; }

    .effect-emoji {
      position: absolute;
      font-size: 2.5rem;
      animation: fadeUp 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes fadeUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    .score-text { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #ff4d6d; font-weight: bold; }
    .exit-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; color: white; background: #333; padding: 5px 15px; border-radius: 20px; }
  </style>
</head>
<body>

  <div class="dev-name" style="position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: bold;">
    Dev by Faisal
  </div>

  <div class="container" id="main-ui">
    <img src="https://media4.giphy.com/media/IzXiddo2twMmdmU8Lv/giphy.gif" alt="Cute GIF" style="width:100%; max-width:400px; display:block; margin:auto; border-radius: 15px;" />
    <h1>Hehe! I Love You Tooo! 😘</h1>
    <p>Hum hamesha sath rahenge! ❤️</p>
    <button class="play-btn" onclick="startGame()">🎮 Play Catch Game 💋</button>
  </div>

  <div id="game-container">
    <div class="score-text">Kisses: <span id="score-val">0</span></div>
    <div class="exit-btn" onclick="location.reload()">Exit</div>
    <div id="basket">🧺</div>
  </div>

  <script>
    let score = 0;
    let gameActive = false;
    const basket = document.getElementById('basket');
    const gameScreen = document.getElementById('game-container');

    function startGame() {
        gameActive = true;
        score = 0;
        document.getElementById('score-val').innerText = score;
        gameScreen.style.display = 'block';
        spawnKiss();
    }

    // Move Basket
    const move = (e) => {
        if(!gameActive) return;
        let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        basket.style.left = Math.max(45, Math.min(window.innerWidth - 45, x)) + 'px';
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move);

    function spawnKiss() {
        if(!gameActive) return;

        const kiss = document.createElement('div');
        kiss.innerText = '💋';
        kiss.className = 'kiss-obj';
        kiss.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        kiss.style.top = '-50px';
        gameScreen.appendChild(kiss);

        let fallInterval = setInterval(() => {
            let top = parseInt(kiss.style.top);
            kiss.style.top = (top + 6) + 'px';

            let kRect = kiss.getBoundingClientRect();
            let bRect = basket.getBoundingClientRect();

            // 1. CATCH LOGIC
            if (kRect.bottom >= bRect.top && kRect.right >= bRect.left && kRect.left <= bRect.right) {
                score++;
                document.getElementById('score-val').innerText = score;
                showEffect('😘', kRect.left, kRect.top); // Catch par happy face
                kiss.remove();
                clearInterval(fallInterval);
            }

            // 2. MISS LOGIC
            if (top > window.innerHeight) {
                showEffect('🥺', kRect.left, window.innerHeight - 50); // Miss par sad face
                kiss.remove();
                clearInterval(fallInterval);
            }
        }, 20);

        setTimeout(spawnKiss, 1000);
    }

    function showEffect(emoji, x, y) {
        const div = document.createElement('div');
        div.innerText = emoji;
        div.className = 'effect-emoji';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        gameScreen.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }
  </script>
</body>
</html>
